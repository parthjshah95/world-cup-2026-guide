<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup 2026 Player Guide</title>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem("wc26-theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = storedTheme || systemTheme;
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f8;
      --ink: #101828;
      --muted: #667085;
      --line: rgba(16, 24, 40, 0.11);
      --panel: rgba(255, 255, 255, 0.88);
      --panel-solid: #ffffff;
      --shadow-soft: 0 18px 44px rgba(15, 23, 42, 0.11);
      --shadow-deep: 0 30px 80px rgba(15, 23, 42, 0.22);
      --radius: 28px;
      --radius-sm: 18px;
      --blue: #2563eb;
      --teal: #0f766e;
      --gold: #b7791f;
      --orange: #c2410c;
      --brick: #9f3412;
      --slate: #475467;
      --header-height: 76px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #080f1d;
      --ink: #eef4ff;
      --muted: #99a6ba;
      --line: rgba(226, 232, 240, 0.12);
      --panel: rgba(15, 23, 42, 0.78);
      --panel-solid: #111827;
      --shadow-soft: 0 18px 48px rgba(0, 0, 0, 0.32);
      --shadow-deep: 0 30px 90px rgba(0, 0, 0, 0.44);
      --blue: #60a5fa;
      --teal: #2dd4bf;
      --gold: #fbbf24;
      --orange: #fb923c;
      --brick: #fdba74;
      --slate: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(37, 99, 235, 0.14), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(15, 118, 110, 0.12), transparent 30%),
        linear-gradient(135deg, #f8fafc 0%, #edf1f7 45%, #f7f9fc 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      overflow-x: hidden;
      transition: background 220ms ease, color 220ms ease;
    }

    :root[data-theme="dark"] body {
      background:
        radial-gradient(circle at 16% 10%, rgba(96, 165, 250, 0.18), transparent 30%),
        radial-gradient(circle at 88% 18%, rgba(45, 212, 191, 0.13), transparent 34%),
        linear-gradient(135deg, #07101f 0%, #0b1220 50%, #111827 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(18px, 4vw, 44px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.62);
      background: rgba(248, 250, 252, 0.78);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
    }

    :root[data-theme="dark"] .topbar {
      border-bottom-color: rgba(226, 232, 240, 0.08);
      background: rgba(8, 15, 29, 0.82);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
      color: var(--ink);
      text-decoration: none;
      border-radius: 999px;
      outline: none;
      transition: transform 180ms ease, color 180ms ease;
    }

    .brand:hover {
      transform: translateY(-1px);
    }

    .brand:focus-visible {
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      border-radius: 50%;
      overflow: hidden;
      object-fit: cover;
      box-shadow:
        0 0 0 1px rgba(16, 24, 40, 0.08),
        0 18px 34px rgba(15, 23, 42, 0.2);
    }

    .brand-wordmark {
      color: var(--ink);
      font-size: 1.35rem;
      font-weight: 1000;
      line-height: 1;
      letter-spacing: 0;
    }

    .nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border: 1px solid rgba(16, 24, 40, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    :root[data-theme="dark"] .nav {
      border-color: rgba(226, 232, 240, 0.12);
      background: rgba(15, 23, 42, 0.76);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .nav-button,
    .ghost-button,
    .solid-button,
    .icon-button {
      border: 1px solid rgba(16, 24, 40, 0.1);
      background: rgba(255, 255, 255, 0.8);
      color: var(--ink);
      min-height: 42px;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 900;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    :root[data-theme="dark"] .nav-button,
    :root[data-theme="dark"] .ghost-button,
    :root[data-theme="dark"] .solid-button,
    :root[data-theme="dark"] .icon-button {
      border-color: rgba(226, 232, 240, 0.12);
      background: rgba(30, 41, 59, 0.72);
      color: var(--ink);
    }

    .nav-button:hover,
    .ghost-button:hover,
    .solid-button:hover,
    .icon-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.13);
    }

    .nav-button.active,
    .solid-button {
      border-color: #101828;
      background: #101828;
      color: #fff;
    }

    :root[data-theme="dark"] .nav-button.active,
    :root[data-theme="dark"] .solid-button {
      border-color: rgba(226, 232, 240, 0.82);
      background: #eef4ff;
      color: #0b1220;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      min-width: min(420px, 34vw);
      margin-left: auto;
    }

    .source-note {
      max-width: 370px;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: right;
    }

    .theme-toggle {
      position: relative;
      flex: 0 0 auto;
      width: 66px;
      height: 42px;
      padding: 0;
      border: 1px solid rgba(16, 24, 40, 0.12);
      border-radius: 999px;
      background: linear-gradient(135deg, #f8fafc, #dbeafe);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        0 14px 28px rgba(15, 23, 42, 0.13);
      transition: background 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    }

    .theme-toggle::before {
      content: "";
      position: absolute;
      top: 5px;
      left: 5px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.95), transparent 32%),
        linear-gradient(135deg, #fde68a, #f59e0b);
      box-shadow: 0 8px 16px rgba(180, 83, 9, 0.28);
      transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1), background 220ms ease, box-shadow 220ms ease;
    }

    .theme-toggle-icon {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      transform: translateY(-50%);
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .theme-toggle-icon.sun {
      left: 13px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2);
      opacity: 0;
    }

    .theme-toggle-icon.moon {
      right: 13px;
      border-radius: 50%;
      box-shadow: inset -5px -3px 0 #475467;
      opacity: 0.8;
    }

    :root[data-theme="dark"] .theme-toggle {
      border-color: rgba(226, 232, 240, 0.16);
      background: linear-gradient(135deg, #0f172a, #1e293b);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 16px 34px rgba(0, 0, 0, 0.36);
    }

    :root[data-theme="dark"] .theme-toggle::before {
      transform: translateX(24px);
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.9), transparent 30%),
        linear-gradient(135deg, #e2e8f0, #94a3b8);
      box-shadow: 0 8px 18px rgba(148, 163, 184, 0.28);
    }

    :root[data-theme="dark"] .theme-toggle-icon.sun {
      opacity: 0.78;
    }

    :root[data-theme="dark"] .theme-toggle-icon.moon {
      opacity: 0;
    }

    main {
      width: min(1680px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .view {
      animation: pageIn 520ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .home-hero {
      min-height: auto;
      display: grid;
      align-content: start;
      gap: 24px;
    }

    .hero-copy {
      display: grid;
      gap: 14px;
      width: min(100%, 950px);
      min-width: 0;
      max-width: 950px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(16, 24, 40, 0.1);
      background: rgba(255, 255, 255, 0.68);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.02;
      letter-spacing: 0;
    }

    h1 {
      max-width: 1020px;
      font-size: clamp(3rem, 7vw, 7.4rem);
      font-weight: 1000;
    }

    .hero-copy p,
    .section-kicker {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: clamp(1rem, 1.35vw, 1.24rem);
    }

    .country-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(16px, 2vw, 26px);
      perspective: 1400px;
    }

    .country-card,
    .mini-country-card {
      --mx: 50%;
      --my: 50%;
      position: relative;
      z-index: 0;
      isolation: isolate;
      display: flex;
      align-items: flex-end;
      min-height: 315px;
      padding: 28px;
      overflow: hidden;
      border: 0;
      border-radius: var(--radius);
      background: var(--flag-bg);
      color: #fff;
      text-align: left;
      box-shadow:
        0 34px 52px rgba(15, 23, 42, 0.24),
        0 15px 22px rgba(15, 23, 42, 0.13);
      transform: translate3d(0, 0, 0) scale(1) rotateX(0) rotateY(0);
      transform-origin: center center;
      transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1), box-shadow 280ms ease, filter 280ms ease;
      will-change: transform, box-shadow, filter;
      animation: cardIn 520ms cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
      animation-delay: calc(var(--i, 0) * 70ms);
    }

    .country-card::before,
    .mini-country-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(255, 255, 255, 0.22), transparent 24%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.03) 0%, rgba(0, 0, 0, 0.12) 48%, rgba(0, 0, 0, 0.72) 100%);
      opacity: 0.92;
      transition: opacity 220ms ease;
    }

    .country-card::after,
    .mini-country-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 28%, rgba(255, 255, 255, 0.24) 48%, transparent 68%);
      transform: translateX(-130%);
      transition: transform 720ms ease;
      pointer-events: none;
    }

    .country-card:hover,
    .country-card:focus-visible,
    .mini-country-card:hover,
    .mini-country-card:focus-visible {
      z-index: 4;
      transform: translate3d(0, -3px, 6px) scale(1.006) rotateX(var(--tilt-y, 0deg)) rotateY(var(--tilt-x, 0deg));
      box-shadow:
        0 36px 56px rgba(15, 23, 42, 0.25),
        0 16px 22px rgba(15, 23, 42, 0.14),
        0 4px 8px rgba(15, 23, 42, 0.06);
      filter: saturate(1.025) contrast(1.006);
    }

    .country-card:hover::after,
    .country-card:focus-visible::after,
    .mini-country-card:hover::after,
    .mini-country-card:focus-visible::after {
      transform: translateX(130%);
    }

    .country-card-content {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      text-shadow: 0 8px 22px rgba(0, 0, 0, 0.34);
    }

    .country-name {
      font-size: clamp(1.8rem, 3vw, 3.4rem);
      font-weight: 1000;
    }

    .hover-metadata {
      position: absolute;
      left: 28px;
      right: 104px;
      top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .country-card:hover .hover-metadata,
    .country-card:focus-visible .hover-metadata {
      opacity: 1;
      transform: translateY(0);
    }

    .country-score {
      position: absolute;
      top: 22px;
      right: 22px;
      display: grid;
      place-items: center;
      min-width: 70px;
      padding: 9px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.28);
      color: #fff;
      text-align: center;
      backdrop-filter: blur(12px);
      text-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    }

    .country-score strong {
      font-size: 1.15rem;
      line-height: 1;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .glass-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08)),
        rgba(15, 23, 42, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.34);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 900;
      backdrop-filter: blur(14px) saturate(1.35);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.24),
        0 8px 18px rgba(15, 23, 42, 0.18);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.62);
    }

    .file-fallback {
      display: none;
      margin: 16px 0;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(194, 65, 12, 0.25);
      background: #fff7ed;
      color: #7c2d12;
      box-shadow: var(--shadow-soft);
    }

    .file-fallback.active {
      display: block;
    }

    .file-fallback p {
      margin: 0 0 10px;
    }

    .file-input,
    input[type="search"],
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(16, 24, 40, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      padding: 10px 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    input[type="search"]:focus,
    select:focus {
      border-color: rgba(37, 99, 235, 0.44);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .team-view,
    .players-view,
    .compare-view {
      width: min(1760px, calc(100vw - 28px));
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .team-hero,
    .players-hero {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      min-height: 320px;
      display: grid;
      align-items: end;
      padding: clamp(26px, 5vw, 58px);
      border-radius: 34px;
      background: var(--flag-bg);
      color: #fff;
      box-shadow: var(--shadow-deep);
    }

    .team-hero::before,
    .players-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.25), transparent 22%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.66) 0%, rgba(0, 0, 0, 0.22) 52%, rgba(0, 0, 0, 0.08) 100%);
    }

    .team-hero-content {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
    }

    .team-title {
      margin: 6px 0 0;
      font-size: clamp(3.2rem, 9vw, 9rem);
      font-weight: 1000;
      text-shadow: 0 20px 42px rgba(0, 0, 0, 0.22);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 12px;
      min-width: min(520px, 100%);
    }

    .hero-stat,
    .stat-card,
    .metric-card {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.13);
      padding: 16px;
    }

    .hero-stat-label,
    .stat-label,
    .metric-label {
      color: rgba(255, 255, 255, 0.76);
      font-size: 0.72rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-card .stat-label,
    .metric-card .metric-label {
      color: var(--muted);
    }

    .hero-stat-value,
    .stat-value,
    .metric-value {
      margin-top: 5px;
      font-size: clamp(1.35rem, 2.2vw, 2.2rem);
      font-weight: 1000;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }

    .hero-stat-detail,
    .stat-detail,
    .metric-detail {
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.74);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .stat-card .stat-detail,
    .metric-card .metric-detail {
      color: var(--muted);
    }

    .controls-panel {
      display: grid;
      grid-template-columns: minmax(260px, 1.5fr) repeat(3, minmax(145px, 1fr));
      gap: 12px;
      align-items: end;
      padding: 14px;
      border: 1px solid rgba(16, 24, 40, 0.08);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-soft);
    }

    .control {
      display: grid;
      gap: 7px;
    }

    .player-list-panel {
      overflow: visible;
      border: 1px solid rgba(16, 24, 40, 0.08);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-deep);
    }

    .list-head {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(16, 24, 40, 0.08);
    }

    .list-title {
      font-size: clamp(1.3rem, 2vw, 2rem);
      font-weight: 1000;
    }

    .result-count {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .list-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sort-controls {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sort-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid rgba(16, 24, 40, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 900;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .sort-button span {
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 950;
      letter-spacing: 0.08em;
    }

    .sort-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
    }

    .sort-button.active {
      border-color: #101828;
      background: #101828;
      color: #fff;
    }

    .sort-button.active span {
      color: rgba(255, 255, 255, 0.72);
    }

    .player-name {
      color: var(--ink);
      font-size: 1.04rem;
      font-weight: 1000;
    }

    .meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .ovr {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      min-height: 40px;
      padding: 6px 12px;
      border-radius: 14px;
      color: #fff;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
    }

    .ovr.elite { background: #7c2d12; }
    .ovr.star { background: #b7791f; }
    .ovr.strong { background: #0f766e; }
    .ovr.rotation { background: #2563eb; }
    .ovr.depth { background: #697586; }
    .ovr.unknown {
      background: #e5e7eb;
      color: #475467;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.09);
      color: #1d4ed8;
      font-size: 0.78rem;
      font-weight: 950;
    }

    .pill {
      background: #f2f4f7;
      color: #344054;
    }

    .notes {
      max-width: 480px;
      color: #344054;
    }

    .player-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 640px), 1fr));
      gap: clamp(18px, 2vw, 26px);
      padding: clamp(18px, 2.4vw, 28px);
    }

    .player-card {
      display: grid;
      grid-template-columns: minmax(260px, 38%) minmax(0, 1fr);
      min-height: 320px;
      overflow: hidden;
      border: 1px solid rgba(16, 24, 40, 0.08);
      border-radius: 28px;
      background: #fff;
      box-shadow:
        0 34px 52px rgba(15, 23, 42, 0.24),
        0 15px 22px rgba(15, 23, 42, 0.13);
      animation: rowIn 420ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      animation-delay: calc(min(var(--i, 0), 18) * 28ms);
      transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 220ms ease;
    }

    .team-view .player-card-grid {
      grid-template-columns: 1fr;
    }

    .team-view .player-card {
      grid-template-columns: minmax(330px, 32%) minmax(0, 1fr);
      min-height: 350px;
    }

    .player-card:hover {
      transform: translateY(-8px);
      box-shadow:
        0 46px 72px rgba(15, 23, 42, 0.3),
        0 22px 30px rgba(15, 23, 42, 0.16);
    }

    .player-photo {
      position: relative;
      isolation: isolate;
      min-height: clamp(300px, 24vw, 420px);
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.4), transparent 34%),
        linear-gradient(135deg, var(--team-a, #101828), var(--team-b, #475467));
      color: #fff;
      font-size: clamp(3rem, 9vw, 5.6rem);
      font-weight: 1000;
    }

    .player-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.18));
      pointer-events: none;
    }

    .player-photo img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .player-photo span {
      position: relative;
      z-index: 2;
      text-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
    }

    .player-card-content {
      min-width: 0;
      display: grid;
      align-content: center;
      gap: 18px;
      padding: clamp(22px, 2.4vw, 34px);
    }

    .player-card-heading {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .player-card .player-name {
      font-size: clamp(1.32rem, 2.1vw, 2.1rem);
    }

    .player-card .ovr {
      min-width: 64px;
      min-height: 52px;
      border-radius: 16px;
      font-size: 1.12rem;
    }

    .player-card .notes {
      max-width: none;
      font-size: clamp(1rem, 1.1vw, 1.08rem);
      line-height: 1.5;
    }

    .card-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      color: #344054;
      font-size: 0.88rem;
      font-weight: 760;
    }

    .card-meta-item {
      min-width: 0;
      padding: 12px;
      border-radius: 16px;
      background: #f8fafc;
    }

    .card-meta-grid b {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-meta-value {
      margin-top: 4px;
      color: var(--ink);
      font-weight: 900;
    }

    .club-chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.09);
      color: #1d4ed8;
      font-size: 0.84rem;
      font-weight: 950;
      line-height: 1.2;
    }

    .club-chip span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .club-chip small {
      flex: 0 0 auto;
      color: #344054;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .empty-state,
    .load-state {
      padding: 38px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .compare-layout {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(22px, 3vw, 38px);
      align-items: start;
    }

    .compare-side {
      min-width: 0;
      min-height: 560px;
      display: grid;
      gap: 18px;
      animation: sideIn 460ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .compare-side + .compare-side {
      padding-left: clamp(22px, 3vw, 38px);
      border-left: 1px solid rgba(148, 163, 184, 0.36);
    }

    .compare-picker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .compare-picker-head h2 {
      font-size: clamp(1.7rem, 3vw, 3.3rem);
      font-weight: 1000;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      perspective: 1000px;
    }

    .mini-country-card {
      min-height: 154px;
      padding: 18px;
      border-radius: 24px;
    }

    .mini-country-card .country-score {
      top: 14px;
      right: 14px;
      min-width: 58px;
      padding: 7px 9px;
      border-radius: 14px;
    }

    .mini-country-card .country-score strong {
      font-size: 0.98rem;
    }

    .mini-country-card .country-name {
      font-size: 1.35rem;
    }

    .selected-team-panel {
      min-width: 0;
      display: grid;
      gap: 18px;
      animation: revealUp 460ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .selected-team-flag {
      position: relative;
      display: grid;
      align-content: end;
      min-height: 220px;
      overflow: hidden;
      padding: 24px;
      border-radius: 30px;
      background: var(--flag-bg);
      color: #fff;
      isolation: isolate;
    }

    .selected-team-flag::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.72));
    }

    .selected-team-title {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
    }

    .selected-team-title h2 {
      font-size: clamp(2.2rem, 5vw, 5rem);
      font-weight: 1000;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-card {
      border-color: rgba(16, 24, 40, 0.08);
      background: #fff;
      backdrop-filter: none;
    }

    .compare-section {
      min-width: 0;
    }

    .compare-section h3 {
      margin: 8px 0 10px;
      font-size: 0.92rem;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .rank-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .compare-player-grid {
      display: grid;
      gap: 10px;
    }

    .compare-player-card {
      grid-template-columns: 102px minmax(0, 1fr);
      min-height: 138px;
      min-width: 0;
      border-radius: 20px;
      background: #f8fafc;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.07);
    }

    .compare-player-card > * {
      min-width: 0;
    }

    .compare-player-media {
      position: relative;
      min-height: 138px;
    }

    .compare-player-rank {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 3;
      display: inline-grid;
      place-items: center;
      min-width: 32px;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(16, 24, 40, 0.78);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 1000;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(10px);
    }

    .compare-player-card .player-photo {
      min-height: 100%;
      height: 100%;
      border-radius: 18px 0 0 18px;
      font-size: 2rem;
    }

    .compare-player-card .player-card-content {
      gap: 8px;
      padding: 12px;
    }

    .compare-player-card .player-card-heading {
      gap: 10px;
    }

    .compare-player-card .player-name {
      min-width: 0;
      font-size: clamp(1rem, 1.45vw, 1.18rem);
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .compare-player-card .meta {
      min-width: 0;
      font-size: 0.78rem;
      overflow-wrap: anywhere;
    }

    .compare-player-card .ovr {
      min-width: 46px;
      min-height: 38px;
      padding: 5px 9px;
      border-radius: 12px;
      font-size: 0.92rem;
    }

    .compare-player-meta {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin: 0;
      font-size: 0.78rem;
    }

    .compare-player-card .card-meta-item {
      padding: 8px;
      border-radius: 12px;
    }

    .compare-player-card .card-meta-grid b {
      font-size: 0.62rem;
    }

    .compare-player-card .card-meta-value {
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .compare-player-card .pill {
      min-height: 24px;
      padding: 4px 8px;
      font-size: 0.68rem;
    }

    .compare-player-card .notes {
      display: -webkit-box;
      min-width: 0;
      max-width: none;
      overflow: hidden;
      color: #475467;
      font-size: 0.82rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .compact-empty-state {
      padding: 18px;
      border-radius: 16px;
      background: #f8fafc;
    }

    .rank-list li,
    .distribution-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #f8fafc;
      color: #344054;
      font-weight: 850;
      animation: rowIn 420ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      animation-delay: calc(var(--i, 0) * 42ms);
    }

    .distribution-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .players-hero {
      min-height: 260px;
      background:
        radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.22), transparent 20%),
        linear-gradient(135deg, #101828, #1d4ed8 48%, #0f766e);
    }

    .players-hero h1 {
      font-size: clamp(3rem, 7vw, 7.2rem);
    }

    .fine-print {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 750;
      padding: 0 4px;
    }

    .data-boundary-note {
      padding: 0 4px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }

    :root[data-theme="dark"] .eyebrow,
    :root[data-theme="dark"] .controls-panel,
    :root[data-theme="dark"] .player-list-panel {
      border-color: var(--line);
      background: rgba(15, 23, 42, 0.72);
      box-shadow: var(--shadow-soft);
    }

    :root[data-theme="dark"] .compare-side + .compare-side {
      border-color: rgba(148, 163, 184, 0.24);
    }

    :root[data-theme="dark"] input[type="search"],
    :root[data-theme="dark"] select {
      border-color: rgba(226, 232, 240, 0.14);
      background: rgba(15, 23, 42, 0.82);
      color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    :root[data-theme="dark"] input[type="search"]::placeholder {
      color: #64748b;
    }

    :root[data-theme="dark"] input[type="search"]:focus,
    :root[data-theme="dark"] select:focus {
      border-color: rgba(96, 165, 250, 0.62);
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.16);
    }

    :root[data-theme="dark"] .list-head {
      border-color: var(--line);
    }

    :root[data-theme="dark"] .player-name,
    :root[data-theme="dark"] .list-title,
    :root[data-theme="dark"] .compare-picker-head h2,
    :root[data-theme="dark"] .selected-team-title h2 {
      color: var(--ink);
    }

    :root[data-theme="dark"] .notes,
    :root[data-theme="dark"] .card-meta-grid,
    :root[data-theme="dark"] .card-meta-value,
    :root[data-theme="dark"] .rank-list li,
    :root[data-theme="dark"] .distribution-row {
      color: #d7dfec;
    }

    :root[data-theme="dark"] .metric-card {
      border-color: var(--line);
      background: rgba(15, 23, 42, 0.9);
      box-shadow: var(--shadow-soft);
    }

    :root[data-theme="dark"] .player-card {
      border-color: var(--line);
      background: rgba(15, 23, 42, 0.9);
      box-shadow:
        0 34px 52px rgba(0, 0, 0, 0.42),
        0 15px 22px rgba(0, 0, 0, 0.3);
    }

    :root[data-theme="dark"] .player-card:hover {
      box-shadow:
        0 46px 72px rgba(0, 0, 0, 0.5),
        0 22px 30px rgba(0, 0, 0, 0.34);
    }

    :root[data-theme="dark"] .card-meta-item,
    :root[data-theme="dark"] .club-chip,
    :root[data-theme="dark"] .pill,
    :root[data-theme="dark"] .rank-list li,
    :root[data-theme="dark"] .compact-empty-state,
    :root[data-theme="dark"] .distribution-row {
      background: rgba(30, 41, 59, 0.92);
      color: #d7dfec;
    }

    :root[data-theme="dark"] .club-chip small {
      color: #99a6ba;
    }

    :root[data-theme="dark"] .sort-button {
      border-color: rgba(226, 232, 240, 0.12);
      background: rgba(30, 41, 59, 0.72);
      color: var(--ink);
    }

    :root[data-theme="dark"] .sort-button.active {
      border-color: rgba(226, 232, 240, 0.82);
      background: #eef4ff;
      color: #0b1220;
    }

    :root[data-theme="dark"] .sort-button.active span {
      color: rgba(11, 18, 32, 0.64);
    }

    :root[data-theme="dark"] .ovr.unknown {
      background: #334155;
      color: #cbd5e1;
    }

    :root[data-theme="dark"] .file-fallback {
      border-color: rgba(251, 146, 60, 0.32);
      background: rgba(67, 20, 7, 0.72);
      color: #fed7aa;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes sideIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1260px) {
      .source-note {
        display: none;
      }

      .top-actions {
        min-width: auto;
      }

      .country-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .team-hero-content {
        grid-template-columns: 1fr;
      }

      .hero-stats,
      .controls-panel {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding-right: 92px;
      }

      .top-actions {
        position: absolute;
        top: 14px;
        right: 14px;
      }

      .nav {
        width: 100%;
        overflow-x: auto;
      }

      .country-grid,
      .compare-layout {
        grid-template-columns: 1fr;
      }

      .compare-side + .compare-side {
        padding-top: 22px;
        padding-left: 0;
        border-top: 1px solid rgba(148, 163, 184, 0.36);
        border-left: 0;
      }

      .country-card {
        min-height: 240px;
      }

      .hero-stats,
      .metrics-grid,
      .controls-panel,
      .distribution-grid {
        grid-template-columns: 1fr;
      }

      .player-card-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      main,
      .team-view,
      .players-view,
      .compare-view {
        width: min(100vw - 18px, 1760px);
      }

      .topbar {
        padding: 12px;
        padding-right: 82px;
      }

      .top-actions {
        top: 11px;
        right: 12px;
      }

      .brand {
        min-width: 0;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
      }

      .brand-wordmark {
        font-size: 1.12rem;
      }

      .theme-toggle {
        width: 58px;
        height: 38px;
      }

      .theme-toggle::before {
        width: 27px;
        height: 27px;
      }

      :root[data-theme="dark"] .theme-toggle::before {
        transform: translateX(20px);
      }

      .nav-button {
        padding: 9px 13px;
      }

      h1 {
        font-size: clamp(2.6rem, 18vw, 4.3rem);
      }

      .compare-view h1 {
        font-size: clamp(2.25rem, 11.5vw, 3rem);
      }

      .country-card {
        min-height: 220px;
        padding: 22px;
      }

      .team-hero,
      .players-hero {
        min-height: 260px;
        padding: 24px;
        border-radius: 26px;
      }

      .list-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .list-actions,
      .sort-controls {
        justify-content: flex-start;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }

      .player-card {
        grid-template-columns: 1fr;
      }

      .team-view .player-card {
        grid-template-columns: 1fr;
      }

      .compare-player-card {
        grid-template-columns: 92px minmax(0, 1fr);
        min-height: 128px;
      }

      .compare-player-media {
        min-height: 128px;
      }

      .compare-player-meta {
        grid-template-columns: 1fr;
      }

      .player-photo {
        min-height: clamp(300px, 72vw, 440px);
      }

      .compare-player-card .player-photo {
        min-height: 100%;
      }

      .player-card-content {
        padding: 18px;
      }

      .card-meta-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="?view=home" data-brand-home aria-label="World Cup 2026 home">
        <img class="brand-mark" src="assets/worldcup-2026-ball.webp" alt="" aria-hidden="true">
        <span class="brand-wordmark">WC26</span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <button class="nav-button" type="button" data-nav-view="home">Home</button>
        <button class="nav-button" type="button" data-nav-view="compare">Compare</button>
        <button class="nav-button" type="button" data-nav-view="players">Top Players</button>
      </nav>
      <div class="top-actions">
        <div class="source-note">Base FC 26 OVR ratings only. Ratings are seed data, not Ultimate Team promo/special cards.</div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
          <span class="theme-toggle-icon sun" aria-hidden="true"></span>
          <span class="theme-toggle-icon moon" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <main>
      <section class="file-fallback" id="fileFallback">
        <p><strong>CSV not auto-loaded.</strong> If you opened this file directly, choose <code>world_cup_player_tables_collected.csv</code>, or run a static server in this folder.</p>
        <input class="file-input" id="csvFileInput" type="file" accept=".csv,text/csv">
      </section>

      <div class="load-state" id="loadState">Loading player data...</div>
      <div id="app"></div>
    </main>
  </div>

  <script>
    const qualifiedTeamFlags = [

      { name: "Cape Verde", group: "H", code: "CPV", flagUrl: "assets/flags/cape-verde.svg", colors: ["#003893", "#cf2027"] },
      { name: "Saudi Arabia", group: "H", code: "KSA", flagUrl: "assets/flags/saudi-arabia.svg", colors: ["#006c35", "#ffffff"] },

      { name: "France", group: "I", code: "FRA", flagUrl: "assets/flags/france.svg", colors: ["#002654", "#ed2939"] },
      { name: "Senegal", group: "I", code: "SEN", flagUrl: "assets/flags/senegal.svg", colors: ["#00853f", "#e31b23"] },
      { name: "Iraq", group: "I", code: "IRQ", flagUrl: "assets/flags/iraq.svg", colors: ["#ce1126", "#000000"] },
      { name: "Norway", group: "I", code: "NOR", flagUrl: "assets/flags/norway.svg", colors: ["#ba0c2f", "#00205b"] },
      { name: "Argentina", group: "J", code: "ARG", flagUrl: "assets/flags/argentina.svg", colors: ["#74acdf", "#ffffff"] },
      { name: "Algeria", group: "J", code: "ALG", flagUrl: "assets/flags/algeria.svg", colors: ["#006233", "#d21034"] },
      { name: "Austria", group: "J", code: "AUT", flagUrl: "assets/flags/austria.svg", colors: ["#ed2939", "#ffffff"] },
      { name: "Jordan", group: "J", code: "JOR", flagUrl: "assets/flags/jordan.svg", colors: ["#007a3d", "#ce1126"] },
      { name: "Portugal", group: "K", code: "POR", flagUrl: "assets/flags/portugal.svg", colors: ["#006600", "#ff0000"] },
      { name: "DR Congo", group: "K", code: "COD", flagUrl: "assets/flags/dr-congo.svg", colors: ["#007fff", "#ce1021"] },
      { name: "Uzbekistan", group: "K", code: "UZB", flagUrl: "assets/flags/uzbekistan.svg", colors: ["#1eb53a", "#0099b5"] },
      { name: "Colombia", group: "K", code: "COL", flagUrl: "assets/flags/colombia.svg", colors: ["#fcd116", "#003893"] },
      { name: "England", group: "L", code: "ENG", flagUrl: "assets/flags/england.svg", colors: ["#ffffff", "#cf142b"] },
      { name: "Croatia", group: "L", code: "CRO", flagUrl: "assets/flags/croatia.svg", colors: ["#ff0000", "#171796"] },
      { name: "Ghana", group: "L", code: "GHA", flagUrl: "assets/flags/ghana.svg", colors: ["#ce1126", "#006b3f"] },
      { name: "Panama", group: "L", code: "PAN", flagUrl: "assets/flags/panama.svg", colors: ["#005293", "#d21034"] },
    ];

    const teamMeta = Object.fromEntries(qualifiedTeamFlags.map((team) => [team.name, team]));
    const preferredTeams = qualifiedTeamFlags.map((team) => team.name);

    const state = {
      rows: [],
      view: "home",
      team: "",
      teamA: "",
      teamB: "",
      pickerSearchA: "",
      pickerSearchB: "",
      search: "",
      filters: {
        team: "",
        club_country: "",
        position_group: ""
      },
      sortKey: "fc26_ovr",
      sortDir: "desc",
      eventsBound: false
    };

    const els = {
      app: document.getElementById("app"),
      loadState: document.getElementById("loadState"),
      fileFallback: document.getElementById("fileFallback"),
      csvFileInput: document.getElementById("csvFileInput"),
      themeToggle: document.querySelector("[data-theme-toggle]")
    };

    function storedTheme() {
      try {
        return localStorage.getItem("wc26-theme");
      } catch (error) {
        return null;
      }
    }

    function saveTheme(theme) {
      try {
        localStorage.setItem("wc26-theme", theme);
      } catch (error) {
        // Theme persistence is a convenience; the toggle still works without storage.
      }
    }

    function currentTheme() {
      return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
    }

    function applyTheme(theme, persist = true) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = nextTheme;
      if (persist) saveTheme(nextTheme);
      if (!els.themeToggle) return;
      const isDark = nextTheme === "dark";
      els.themeToggle.setAttribute("aria-pressed", String(isDark));
      els.themeToggle.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
      els.themeToggle.title = isDark ? "Switch to light mode" : "Switch to dark mode";
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(value);
          if (row.some((cell) => cell.length > 0)) rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      row.push(value);
      if (row.some((cell) => cell.length > 0)) rows.push(row);

      const headers = rows.shift().map((header) => header.trim().replace(/^\uFEFF/, ""));
      return rows.map((cells, index) => {
        const obj = {};
        headers.forEach((header, cellIndex) => {
          obj[header] = (cells[cellIndex] || "").trim();
        });
        obj._id = `${obj.team || "team"}-${obj.player || "player"}-${index}`;
        obj._ovr = parseRating(obj.fc26_ovr);
        obj._position_group = positionGroup(obj.position);
        return obj;
      });
    }

    function parseRating(value) {
      const parsed = Number.parseInt(String(value || "").trim(), 10);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function positionGroup(position) {
      const p = String(position || "").toUpperCase();
      if (p.includes("GK")) return "GK";
      if (p.includes("CB") || p.includes("LB") || p.includes("RB") || p.includes("RWB") || p.includes("DEF") || p.includes("FULLBACK")) return "DEF";
      if (p.includes("CM") || p.includes("CDM") || p.includes("DM") || p.includes("AM") || p.includes("CAM") || p.includes("MID")) return "MID";
      if (p.includes("LW") || p.includes("RW") || p.includes("ST") || p.includes("CF") || p.includes("WINGER") || p.includes("FORWARD") || p.includes("STRIKER")) return "ATT";
      return "OTHER";
    }

    function ratingBand(rating) {
      if (rating === null) return { className: "unknown", label: "Unknown" };
      if (rating >= 90) return { className: "elite", label: "Elite" };
      if (rating >= 85) return { className: "star", label: "World-class / star" };
      if (rating >= 80) return { className: "strong", label: "Strong international" };
      if (rating >= 75) return { className: "rotation", label: "Squad / rotation" };
      return { className: "depth", label: "Depth / development" };
    }

    function labelize(value) {
      return String(value || "Unknown")
        .replace(/_/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getTeams() {
      return preferredTeams
        .filter((team) => state.rows.some((row) => row.team === team))
        .sort(compareTeamsByStrength);
    }

    function getMeta(team) {
      return teamMeta[team] || {
        code: team.slice(0, 3).toUpperCase(),
        colors: ["#101828", "#667085"],
        flagUrl: ""
      };
    }

    function styleVars(team) {
      const meta = getMeta(team);
      const fallback = `linear-gradient(135deg, ${meta.colors[0]}, ${meta.colors[1]})`;
      const flagBg = meta.flagUrl ? `url('${meta.flagUrl}') center/cover no-repeat, ${fallback}` : fallback;
      return `--flag-bg: ${flagBg}; --team-a: ${meta.colors[0]}; --team-b: ${meta.colors[1]};`;
    }

    function teamRows(team) {
      return state.rows.filter((row) => row.team === team);
    }

    function ratedRows(rows) {
      return rows.filter((row) => row._ovr !== null);
    }

    function averageRating(rows) {
      const rated = ratedRows(rows);
      if (!rated.length) return null;
      return rated.reduce((sum, row) => sum + row._ovr, 0) / rated.length;
    }

    function medianRating(rows) {
      const ratings = ratedRows(rows).map((row) => row._ovr).sort((a, b) => a - b);
      if (!ratings.length) return null;
      const middle = Math.floor(ratings.length / 2);
      return ratings.length % 2 ? ratings[middle] : (ratings[middle - 1] + ratings[middle]) / 2;
    }

    function topElevenRating(rows) {
      const ratings = ratedRows(rows)
        .map((row) => row._ovr)
        .sort((a, b) => b - a)
        .slice(0, 11);
      if (!ratings.length) return { score: null, ratedCount: 0, complete: false };
      return {
        score: ratings.reduce((sum, rating) => sum + rating, 0) / ratings.length,
        ratedCount: ratings.length,
        complete: ratings.length >= 11
      };
    }

    function compareTeamsByStrength(a, b) {
      const aScore = topElevenRating(teamRows(a));
      const bScore = topElevenRating(teamRows(b));
      if (aScore.complete !== bScore.complete) return aScore.complete ? -1 : 1;
      if (aScore.score !== bScore.score) return (bScore.score || -1) - (aScore.score || -1);
      return a.localeCompare(b);
    }

    function topRated(rows) {
      const rated = ratedRows(rows);
      if (!rated.length) return null;
      return [...rated].sort((a, b) => b._ovr - a._ovr || a.player.localeCompare(b.player))[0];
    }

    function countsBy(rows, key) {
      return rows.reduce((acc, row) => {
        const value = row[key] || "Unknown";
        acc[value] = (acc[value] || 0) + 1;
        return acc;
      }, {});
    }

    function teamStats(team) {
      const rows = teamRows(team);
      const rated = ratedRows(rows);
      const top = topRated(rows);
      const strength = topElevenRating(rows);
      return {
        team,
        rows,
        count: rows.length,
        ratedCount: rated.length,
        average: averageRating(rows),
        strengthScore: strength.score,
        strengthRatedCount: strength.ratedCount,
        strengthComplete: strength.complete,
        median: medianRating(rows),
        top,
        stars85: rated.filter((row) => row._ovr >= 85).length,
        elite90: rated.filter((row) => row._ovr >= 90).length,
        positionCounts: countsBy(rows, "_position_group"),
        clubCountryCounts: countsBy(rows, "club_country"),
        topFive: [...rated].sort((a, b) => b._ovr - a._ovr || a.player.localeCompare(b.player)).slice(0, 5)
      };
    }

    function formatNumber(value, decimals = 1) {
      return value === null || value === undefined ? "—" : Number(value).toFixed(decimals);
    }

    function initials(name) {
      return String(name || "?")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0])
        .join("")
        .toUpperCase();
    }

    function renderAge(row) {
      return row.age ? `Age ${escapeHtml(row.age)}` : "Age —";
    }

    function renderPlayerPhoto(row) {
      const headshot = row.headshot_url || "";
      const fallback = escapeHtml(initials(row.player));
      const img = headshot ? `<img src="${escapeHtml(headshot)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span>${fallback}</span>'">` : `<span>${fallback}</span>`;
      return `<div class="player-photo" style="${styleVars(row.team)}" aria-hidden="true">${img}</div>`;
    }

    function renderOvr(row) {
      const band = ratingBand(row._ovr);
      const display = row._ovr === null ? "—" : row._ovr;
      return `<span class="ovr ${band.className}" title="${escapeHtml(band.label)}">${display}</span>`;
    }

    function renderNotes(notes) {
      const text = String(notes || "");
      return escapeHtml(text);
    }

    function renderDataBoundaryNote() {
      return `<p class="data-boundary-note">Data rule: inclusion type has been removed from the CSV and UI. Do not reintroduce it into player cards, filters, or compare views.</p>`;
    }

    function routeTo(next) {
      const params = new URLSearchParams();
      params.set("view", next.view || state.view);
      if (next.team) params.set("team", next.team);
      if (next.teamA) params.set("teamA", next.teamA);
      if (next.teamB) params.set("teamB", next.teamB);
      if (next.search) params.set("q", next.search);
      if (next.sortKey) params.set("sort", next.sortKey);
      if (next.sortDir) params.set("dir", next.sortDir);
      ["club_country", "position_group"].forEach((key) => {
        if (next.filters?.[key]) params.set(key, next.filters[key]);
      });
      window.history.pushState({}, "", `${window.location.pathname}?${params.toString()}`);
      loadRoute();
      render();
    }

    function loadRoute() {
      const params = new URLSearchParams(window.location.search);
      const rawView = params.get("view");
      const view = rawView === "top" ? "players" : rawView;
      const legacyTeam = params.get("team");
      state.view = view || (legacyTeam ? "team" : "home");
      state.team = legacyTeam || state.team || getTeams()[0] || "";
      state.teamA = params.get("teamA") || "";
      state.teamB = params.get("teamB") || "";
      state.search = params.get("q") || "";
      state.sortKey = params.get("sort") || "fc26_ovr";
      state.sortDir = params.get("dir") || "desc";
      state.filters = {
        team: params.get("teamFilter") || "",
        club_country: params.get("club_country") || "",
        position_group: params.get("position_group") || ""
      };

      if (state.view === "team" && !teamRows(state.team).length) {
        state.team = getTeams()[0] || "";
      }
      if (!["home", "team", "compare", "players"].includes(state.view)) state.view = "home";
    }

    function syncNav() {
      document.querySelectorAll("[data-nav-view]").forEach((button) => {
        const view = button.dataset.navView;
        button.classList.toggle("active", state.view === view || (view === "players" && state.view === "players"));
      });
    }

    function render(focusSelector = "") {
      if (!state.rows.length) return;
      syncNav();
      if (state.view === "team") renderTeamView();
      else if (state.view === "compare") renderCompareView();
      else if (state.view === "players") renderPlayersView();
      else renderHomeView();
      bindDynamicEffects();
      animateCounters();
      if (focusSelector) restoreFocus(focusSelector);
    }

    function restoreFocus(selector) {
      window.requestAnimationFrame(() => {
        const node = document.querySelector(selector);
        if (!node) return;
        node.focus();
        const valueLength = node.value ? node.value.length : 0;
        if (typeof node.setSelectionRange === "function") node.setSelectionRange(valueLength, valueLength);
      });
    }

    function renderHomeView() {
      const teams = getTeams();
      els.app.innerHTML = `
        <section class="view home-hero">
          <div class="country-grid">
            ${teams.map((team, index) => renderCountryCard(team, index, "large")).join("")}
          </div>
        </section>
      `;
    }

    function renderCountryCard(team, index, size) {
      const stats = teamStats(team);
      const className = size === "mini" ? "mini-country-card" : "country-card";
      const score = formatNumber(stats.strengthScore);
      return `
        <button class="${className}" type="button" data-team-card="${escapeHtml(team)}" style="${styleVars(team)} --i: ${index};">
          ${size !== "mini" ? `
            <div class="hover-metadata">
              <span class="glass-pill">Top ${escapeHtml(stats.top ? `${stats.top.player} · ${renderAge(stats.top)}` : "—")}</span>
            </div>
          ` : ""}
          <span class="country-score" aria-label="Rating score ${score}">
            <strong>${score}</strong>
          </span>
          <span class="country-card-content">
            <span>
              <span class="country-name">${escapeHtml(team)}</span>
            </span>
          </span>
        </button>
      `;
    }

    function renderTeamView() {
      const team = state.team;
      const stats = teamStats(team);
      const rows = [...teamRows(team)].sort(compareRows);
      els.app.innerHTML = `
        <section class="view team-view">
          <section class="team-hero" style="${styleVars(team)}">
            <div class="team-hero-content">
              <div>
                <h1 class="team-title">${escapeHtml(team)}</h1>
              </div>
              <div class="hero-stats">
                ${renderHeroStat("Avg OVR", formatNumber(stats.average), "Blank ratings excluded")}
                ${renderHeroStat("Top Player", stats.top ? stats.top._ovr : "—", stats.top ? `${stats.top.player} · ${renderAge(stats.top)}` : "No rating")}
              </div>
            </div>
          </section>
          ${renderDataBoundaryNote()}
          ${renderPlayerList(rows, `${team} Player Cards`, `${stats.count} players in dataset`, {
            showTeam: false,
            showReset: false
          })}
          <p class="fine-print">Future iterations can add per-row source URLs for stricter provenance.</p>
        </section>
      `;
    }

    function renderHeroStat(label, value, detail) {
      return `
        <article class="hero-stat">
          <div class="hero-stat-label">${escapeHtml(label)}</div>
          <div class="hero-stat-value" data-count="${Number.isFinite(Number(value)) ? Number(value) : ""}">${escapeHtml(value)}</div>
          <div class="hero-stat-detail">${escapeHtml(detail)}</div>
        </article>
      `;
    }

    function renderPlayersView() {
      const rows = filteredPlayerRows(state.rows, true);
      els.app.innerHTML = `
        <section class="view players-view">
          <section class="players-hero">
            <div>
              <div class="eyebrow">Global board</div>
              <h1>Top Players</h1>
              <p class="section-kicker">A full-data view for quick cross-country sorting, filtering, and OVR comparison.</p>
            </div>
          </section>
          ${renderControls(true)}
          ${renderDataBoundaryNote()}
          ${renderPlayerList(rows, "All Players", `${rows.length} visible players · ${state.rows.length} total`)}
        </section>
      `;
    }

    function renderControls(includeTeam) {
      const teamControl = includeTeam ? `
        <div class="control">
          <label for="teamFilter">Team</label>
          <select id="teamFilter" data-filter="team">
            <option value="">All teams</option>
            ${getTeams().map((team) => `<option value="${escapeHtml(team)}" ${state.filters.team === team ? "selected" : ""}>${escapeHtml(team)}</option>`).join("")}
          </select>
        </div>
      ` : "";
      return `
        <section class="controls-panel" aria-label="Player filters">
          <div class="control">
            <label for="searchInput">Search</label>
            <input id="searchInput" data-search type="search" value="${escapeHtml(state.search)}" placeholder="Player, club, position, age, notes">
          </div>
          ${teamControl}
          ${renderSelect("club_country", "Club Country", "All club countries", uniqueSorted("club_country"))}
          ${renderSelect("position_group", "Position Group", "All position groups", uniqueSorted("_position_group"))}
        </section>
      `;
    }

    function renderSelect(key, label, allLabel, values) {
      return `
        <div class="control">
          <label for="${key}">${escapeHtml(label)}</label>
          <select id="${key}" data-filter="${key}">
            <option value="">${escapeHtml(allLabel)}</option>
            ${values.map((value) => `<option value="${escapeHtml(value)}" ${state.filters[key] === value ? "selected" : ""}>${escapeHtml(labelize(value))}</option>`).join("")}
          </select>
        </div>
      `;
    }

    function uniqueSorted(key, rows = state.rows) {
      return [...new Set(rows.map((row) => row[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function filteredPlayerRows(baseRows, includeTeamFilter) {
      let rows = [...baseRows];
      if (includeTeamFilter && state.filters.team) rows = rows.filter((row) => row.team === state.filters.team);
      if (state.filters.club_country) rows = rows.filter((row) => row.club_country === state.filters.club_country);
      if (state.filters.position_group) rows = rows.filter((row) => row._position_group === state.filters.position_group);

      const q = state.search.trim().toLowerCase();
      if (q) {
        rows = rows.filter((row) => [
          row.player,
          row.team,
          row.club,
          row.club_country,
          row.club_with_country,
          row.position,
          row.age,
          row.notes
        ].some((value) => String(value || "").toLowerCase().includes(q)));
      }

      rows.sort(compareRows);
      return rows;
    }

    function compareRows(a, b) {
      const dir = state.sortDir === "asc" ? 1 : -1;
      if (state.sortKey === "fc26_ovr" || state.sortKey === "age") {
        const av = state.sortKey === "fc26_ovr" ? a._ovr : Number.parseInt(a.age || "", 10);
        const bv = state.sortKey === "fc26_ovr" ? b._ovr : Number.parseInt(b.age || "", 10);
        const aMissing = !Number.isFinite(av);
        const bMissing = !Number.isFinite(bv);
        if (aMissing && bMissing) return a.player.localeCompare(b.player);
        if (aMissing) return 1;
        if (bMissing) return -1;
        if (av !== bv) return (av - bv) * dir;
        return a.player.localeCompare(b.player);
      }
      const av = String(a[state.sortKey] || "").toLowerCase();
      const bv = String(b[state.sortKey] || "").toLowerCase();
      if (av === bv) return a.player.localeCompare(b.player);
      return av.localeCompare(bv) * dir;
    }

    function renderPlayerList(rows, title, countText, options = {}) {
      const columnOptions = {
        showTeam: true,
        showReset: true,
        ...options
      };
      return `
        <section class="player-list-panel">
          <div class="list-head">
            <div>
              <div class="list-title">${escapeHtml(title)}</div>
              <div class="result-count">${escapeHtml(countText)}</div>
            </div>
            <div class="list-actions">
              ${renderSortControls(columnOptions)}
              ${columnOptions.showReset ? `<button class="ghost-button" type="button" data-reset-filters>Reset filters</button>` : ""}
            </div>
          </div>
          ${rows.length ? `
            <div class="player-card-grid">
              ${rows.map((row, index) => renderPlayerCard(row, index, columnOptions)).join("")}
            </div>
          ` : `<div class="empty-state">No players match the current filters.</div>`}
        </section>
      `;
    }

    function renderSortControls(options) {
      const fields = [
        { key: "fc26_ovr", label: "OVR" },
        { key: "player", label: "Player" },
        ...(options.showTeam ? [{ key: "team", label: "Country" }] : []),
        { key: "position", label: "Position" },
        { key: "age", label: "Age" },
        { key: "club_with_country", label: "Club" }
      ];
      return `
        <div class="sort-controls" aria-label="Sort players">
          <span class="sort-label">Sort</span>
          ${fields.map((field) => renderSortButton(field)).join("")}
        </div>
      `;
    }

    function renderSortButton(field) {
      const active = state.sortKey === field.key;
      const direction = active ? state.sortDir.toUpperCase() : "";
      return `
        <button class="sort-button ${active ? "active" : ""}" type="button" data-sort="${escapeHtml(field.key)}" aria-pressed="${active}">
          ${escapeHtml(field.label)}${active ? ` <span>${escapeHtml(direction)}</span>` : ""}
        </button>
      `;
    }

    function renderCardMeta(label, value) {
      return `
        <div class="card-meta-item">
          <b>${escapeHtml(label)}</b>
          <div class="card-meta-value">${value || "—"}</div>
        </div>
      `;
    }

    function renderClubChip(row) {
      const club = escapeHtml(row.club || "Club unknown");
      const country = row.club_country ? `<small> · ${escapeHtml(row.club_country)}</small>` : "";
      return `<span class="club-chip"><span>${club}</span>${country}</span>`;
    }

    function renderPlayerCard(row, index, options) {
      const position = escapeHtml(row.position || "Position unknown");
      const team = escapeHtml(row.team || "—");
      return `
        <article class="player-card" style="--i: ${index};">
          ${renderPlayerPhoto(row)}
          <div class="player-card-content">
            <div class="player-card-heading">
              <div>
                <div class="player-name">${escapeHtml(row.player)}</div>
              </div>
              ${renderOvr(row)}
            </div>
            <div class="card-meta-grid">
              ${options.showTeam ? renderCardMeta("Country", team) : ""}
              ${renderCardMeta("Position", position)}
              ${renderCardMeta("Age", renderAge(row))}
              ${renderCardMeta("Club", renderClubChip(row))}
            </div>
            <div class="notes">${renderNotes(row.notes)}</div>
          </div>
        </article>
      `;
    }

    function renderComparePlayerCard(row, index) {
      return `
        <article class="player-card compare-player-card" style="--i: ${index};">
          <div class="compare-player-media">
            <span class="compare-player-rank">#${index + 1}</span>
            ${renderPlayerPhoto(row)}
          </div>
          <div class="player-card-content">
            <div class="player-card-heading">
              <div>
                <div class="player-name">${escapeHtml(row.player)}</div>
                <div class="meta">${escapeHtml(row.position || "Position unknown")} · ${renderAge(row)}</div>
              </div>
              ${renderOvr(row)}
            </div>
            <div class="card-meta-grid compare-player-meta">
              ${renderCardMeta("Club", renderClubChip(row))}
            </div>
            <div class="notes">${renderNotes(row.notes)}</div>
          </div>
        </article>
      `;
    }

    function renderComparePlayerCards(rows) {
      if (!rows.length) return `<div class="empty-state compact-empty-state">No ratings collected</div>`;
      return `
        <div class="compare-player-grid">
          ${rows.map((row, index) => renderComparePlayerCard(row, index)).join("")}
        </div>
      `;
    }

    function renderCompareView() {
      els.app.innerHTML = `
        <section class="view compare-view">
          <div class="hero-copy">
            <div class="eyebrow">Head-to-head</div>
            <h1>Compare countries side by side.</h1>
            <p>Pick a team for each side. Each half can be changed independently, and the URL updates once both selections are made.</p>
          </div>
          <div class="compare-layout">
            ${renderCompareSide("A", state.teamA, state.pickerSearchA)}
            ${renderCompareSide("B", state.teamB, state.pickerSearchB)}
          </div>
        </section>
      `;
    }

    function renderCompareSide(side, team, search) {
      if (!team) return renderTeamPicker(side, search);
      return renderSelectedTeam(side, team);
    }

    function renderTeamPicker(side, search) {
      const q = search.trim().toLowerCase();
      const teams = getTeams().filter((team) => {
        const meta = getMeta(team);
        return !q || team.toLowerCase().includes(q) || meta.code.toLowerCase().includes(q);
      });
      return `
        <section class="compare-side">
          <div class="compare-picker-head">
            <div>
              <div class="eyebrow">Team ${side}</div>
              <h2>Select country</h2>
            </div>
          </div>
          <input type="search" data-picker-search="${side}" value="${escapeHtml(search)}" placeholder="Search countries">
          <div class="mini-grid">
            ${teams.map((team, index) => renderMiniCompareCard(team, side, index)).join("")}
          </div>
        </section>
      `;
    }

    function renderMiniCompareCard(team, side, index) {
      return renderCountryCard(team, index, "mini").replace(`data-team-card="${escapeHtml(team)}"`, `data-compare-team="${escapeHtml(team)}" data-side="${side}"`);
    }

    function renderSelectedTeam(side, team) {
      const stats = teamStats(team);
      return `
        <section class="compare-side">
          <article class="selected-team-panel">
            <div class="selected-team-flag" style="${styleVars(team)}">
              <div class="selected-team-title">
                <div>
                  <h2>${escapeHtml(team)}</h2>
                </div>
              </div>
            </div>
            <div class="metrics-grid">
              ${renderMetric("Avg OVR", formatNumber(stats.average), "Mean of rated rows")}
              ${renderMetric("Median OVR", formatNumber(stats.median), "Middle rating")}
              ${renderMetric("Top Player", stats.top ? stats.top.player : "—", stats.top ? `${stats.top._ovr} OVR · ${renderAge(stats.top)}` : "No rating")}
              ${renderMetric("85+ / 90+", `${stats.stars85} / ${stats.elite90}`, "Star and elite counts")}
            </div>
            <div class="compare-section">
              <button class="ghost-button" type="button" data-change-side="${side}">Change team</button>
            </div>
            <div class="compare-section">
              <h3>Top 5 Players</h3>
              ${renderComparePlayerCards(stats.topFive)}
            </div>
            <div class="compare-section">
              <h3>Position Groups</h3>
              <div class="distribution-grid">
                ${["GK", "DEF", "MID", "ATT"].map((key) => `<div class="distribution-row"><span>${key}</span><strong>${stats.positionCounts[key] || 0}</strong></div>`).join("")}
              </div>
            </div>
            <div class="compare-section">
              <h3>Club Countries</h3>
              <div class="distribution-grid">
                ${renderDistribution(stats.clubCountryCounts, 6)}
              </div>
            </div>
          </article>
        </section>
      `;
    }

    function renderMetric(label, value, detail) {
      const numeric = typeof value === "number" || /^[0-9.]+$/.test(String(value));
      return `
        <article class="metric-card">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div class="metric-value" data-count="${numeric ? value : ""}">${escapeHtml(value)}</div>
          <div class="metric-detail">${escapeHtml(detail)}</div>
        </article>
      `;
    }

    function renderDistribution(counts, limit, labelValues = false) {
      const entries = Object.entries(counts)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, limit);
      if (!entries.length) return `<div class="distribution-row"><span>None</span><strong>0</strong></div>`;
      return entries
        .map(([key, count], index) => `<div class="distribution-row" style="--i: ${index};"><span>${escapeHtml(labelValues ? labelize(key) : key)}</span><strong>${count}</strong></div>`)
        .join("");
    }

    function bindDynamicEffects() {
      document.querySelectorAll(".country-card, .mini-country-card").forEach((card) => {
        card.addEventListener("pointermove", (event) => {
          const rect = card.getBoundingClientRect();
          const x = ((event.clientX - rect.left) / rect.width) * 100;
          const y = ((event.clientY - rect.top) / rect.height) * 100;
          card.style.setProperty("--mx", `${x}%`);
          card.style.setProperty("--my", `${y}%`);
          card.style.setProperty("--tilt-x", `${(x - 50) / 20}deg`);
          card.style.setProperty("--tilt-y", `${(50 - y) / 20}deg`);
        });
        card.addEventListener("pointerleave", () => {
          card.style.removeProperty("--tilt-x");
          card.style.removeProperty("--tilt-y");
        });
      });
    }

    function animateCounters() {
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion) return;
      document.querySelectorAll("[data-count]").forEach((node) => {
        if (!node.dataset.count.trim()) return;
        const target = Number(node.dataset.count);
        if (!Number.isFinite(target)) return;
        const decimals = String(node.textContent).includes(".") ? 1 : 0;
        const duration = 720;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          node.textContent = (target * eased).toFixed(decimals);
          if (t < 1) requestAnimationFrame(tick);
          else node.textContent = target.toFixed(decimals);
        };
        requestAnimationFrame(tick);
      });
    }

    function clearFilters() {
      state.search = "";
      state.filters = {
        team: "",
        club_country: "",
        position_group: ""
      };
      state.sortKey = "fc26_ovr";
      state.sortDir = "desc";
    }

    function bindEvents() {
      if (state.eventsBound) return;
      state.eventsBound = true;

      els.themeToggle?.addEventListener("click", () => {
        applyTheme(currentTheme() === "dark" ? "light" : "dark");
      });

      document.querySelector("[data-brand-home]").addEventListener("click", (event) => {
        event.preventDefault();
        clearFilters();
        routeTo({ view: "home" });
      });

      document.querySelector(".nav").addEventListener("click", (event) => {
        const button = event.target.closest("[data-nav-view]");
        if (!button) return;
        clearFilters();
        routeTo({ view: button.dataset.navView });
      });

      els.app.addEventListener("click", (event) => {
        const teamCard = event.target.closest("[data-team-card]");
        if (teamCard) {
          clearFilters();
          routeTo({ view: "team", team: teamCard.dataset.teamCard });
          return;
        }

        const compareCard = event.target.closest("[data-compare-team]");
        if (compareCard) {
          const side = compareCard.dataset.side;
          if (side === "A") state.teamA = compareCard.dataset.compareTeam;
          else state.teamB = compareCard.dataset.compareTeam;
          updateCompareUrl();
          render();
          return;
        }

        const changeButton = event.target.closest("[data-change-side]");
        if (changeButton) {
          if (changeButton.dataset.changeSide === "A") state.teamA = "";
          else state.teamB = "";
          updateCompareUrl();
          render();
          return;
        }

        const resetButton = event.target.closest("[data-reset-filters]");
        if (resetButton) {
          clearFilters();
          render();
          return;
        }

        const sortControl = event.target.closest("[data-sort]");
        if (sortControl) {
          const key = sortControl.dataset.sort;
          if (state.sortKey === key) {
            state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
          } else {
            state.sortKey = key;
            state.sortDir = key === "fc26_ovr" ? "desc" : "asc";
          }
          render();
        }
      });

      els.app.addEventListener("input", (event) => {
        const search = event.target.closest("[data-search]");
        if (search) {
          state.search = search.value;
          render("[data-search]");
          return;
        }

        const picker = event.target.closest("[data-picker-search]");
        if (picker) {
          if (picker.dataset.pickerSearch === "A") state.pickerSearchA = picker.value;
          else state.pickerSearchB = picker.value;
          render(`[data-picker-search="${picker.dataset.pickerSearch}"]`);
        }
      });

      els.app.addEventListener("change", (event) => {
        const filter = event.target.closest("[data-filter]");
        if (!filter) return;
        const key = filter.dataset.filter;
        state.filters[key] = filter.value;
        render();
      });

      els.csvFileInput.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        finishLoad(await file.text());
        els.fileFallback.classList.remove("active");
      });

      window.addEventListener("popstate", () => {
        loadRoute();
        render();
      });

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (event) => {
        if (storedTheme()) return;
        applyTheme(event.matches ? "dark" : "light", false);
      });
    }

    function updateCompareUrl() {
      const params = new URLSearchParams();
      params.set("view", "compare");
      if (state.teamA) params.set("teamA", state.teamA);
      if (state.teamB) params.set("teamB", state.teamB);
      window.history.pushState({}, "", `${window.location.pathname}?${params.toString()}`);
    }

    function finishLoad(text) {
      state.rows = parseCsv(text);
      loadRoute();
      bindEvents();
      els.loadState.hidden = true;
      render();
    }

    async function loadCsv() {
      try {
        const response = await fetch("world_cup_player_tables_collected.csv", { cache: "no-store" });
        if (!response.ok) throw new Error(`CSV request failed: ${response.status}`);
        finishLoad(await response.text());
      } catch (error) {
        els.loadState.textContent = "CSV could not be auto-loaded.";
        els.fileFallback.classList.add("active");
      }
    }

    applyTheme(currentTheme(), false);
    loadCsv();
  </script>
</body>
</html>
