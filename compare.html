<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup 2026 Player Guide</title>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem("wc26-theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = storedTheme || systemTheme;
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="styles/app.css">
  <script src="js/shared/utils.js" defer></script>
  <script src="js/shared/theme.js" defer></script>
  <script src="js/shared/data.js" defer></script>
  <script src="js/shared/stats.js" defer></script>
  <script src="js/components/topbar.js" defer></script>
  <script src="js/components/country-card.js" defer></script>
  <script src="js/components/player-card.js" defer></script>
  <script src="js/components/metrics.js" defer></script>
  <script src="js/pages/compare.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <div id="topbar"></div>
    <main>
      <div class="load-state" id="loadState">Loading player data...</div>
      <div id="app"></div>
    </main>
  </div>
</body>
</html>
